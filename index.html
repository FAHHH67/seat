```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seat Picker</title>

<style>

body{
margin:0;
background:#e9e9e9;
font-family:sans-serif;
display:flex;
height:100vh;
align-items:center;
justify-content:center;
}

/* 전체 레이아웃 */
#layout{
display:flex;
gap:30px;
align-items:center;
}

/* 자리 생성 영역 (레이어2) */
#seatArea{
width:600px;
height:400px;
background:white;
border:3px solid black;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
position:relative;
}

/* 오른쪽 패널 */
#panel{
width:180px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

#panel button{
width:100%;
margin-top:8px;
padding:6px;
}

#panel input{
width:100%;
margin-top:6px;
margin-bottom:6px;
padding:5px;
}

/* 동그라미 */
.circle{
position:absolute;
width:70px;
height:70px;
border:3px solid black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
background:white;
transform:translate(-50%,-50%);
}

</style>
</head>

<body>

<div id="layout">

<div id="seatArea"></div>

<div id="panel">

<div>제외 번호</div>
<input id="exclude" placeholder="2,5,7">

<button onclick="undo()">Undo</button>
<button onclick="shuffleNumbers()">Random</button>
<button onclick="resetAll()">Reset</button>

</div>

</div>

<script>

let area=document.getElementById("seatArea")
let circles=[]
let createNumber=1

area.addEventListener("click",function(e){

let rect=area.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

let circle=document.createElement("div")

circle.className="circle"
circle.innerText=createNumber

circle.style.left=x+"px"
circle.style.top=y+"px"

area.appendChild(circle)

circles.push(circle)

createNumber++

})

function undo(){

let last=circles.pop()

if(last){
last.remove()
createNumber--
}

}

function getExclude(){

let text=document.getElementById("exclude").value

if(text.trim()==="") return []

return text.split(",").map(n=>parseInt(n.trim())).filter(n=>!isNaN(n))

}

function shuffleNumbers(){

let exclude=getExclude()

let need=circles.length
let numbers=[]
let n=1

while(numbers.length < need){

if(!exclude.includes(n)){
numbers.push(n)
}

n++

}

numbers.sort(()=>Math.random()-0.5)

circles.forEach((c,i)=>{
c.innerText=numbers[i]
})

}

function resetAll(){

circles.forEach(c=>c.remove())

circles=[]
createNumber=1

}

</script>

</body>
</html>
