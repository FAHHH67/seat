```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seat Picker</title>

<style>

body{
margin:0;
font-family:sans-serif;
display:flex;
height:100vh;
}

/* 자리 찍는 영역 */
#canvas{
flex:1;
background:white;
position:relative;
border-right:2px solid black;
}

/* 오른쪽 UI 패널 */
#panel{
width:180px;
background:#f5f5f5;
padding:15px;
box-sizing:border-box;
}

#panel button{
display:block;
width:100%;
margin-top:8px;
}

#panel input{
width:100%;
}

/* 동그라미 */
.circle{
position:absolute;
width:70px;
height:70px;
border:3px solid black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
transform:translate(-50%,-50%);
background:white;
}

</style>

</head>

<body>

<div id="canvas"></div>

<div id="panel">

<div>제외 번호</div>
<input id="exclude" placeholder="2,5,7">

<button onclick="undo()">Undo</button>
<button onclick="shuffleNumbers()">Random</button>
<button onclick="resetAll()">Reset</button>

</div>

<script>

let canvas=document.getElementById("canvas")

let circles=[]
let createNumber=1

canvas.addEventListener("click",function(e){

let rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

let circle=document.createElement("div")

circle.className="circle"
circle.innerText=createNumber

circle.style.left=x+"px"
circle.style.top=y+"px"

canvas.appendChild(circle)

circles.push(circle)

createNumber++

})

function undo(){

let last=circles.pop()

if(last){
last.remove()
createNumber--
}

}

function getExclude(){

let text=document.getElementById("exclude").value

if(text.trim()==="") return []

return text.split(",").map(n=>parseInt(n.trim())).filter(n=>!isNaN(n))

}

function shuffleNumbers(){

let exclude=getExclude()

let need=circles.length
let numbers=[]
let n=1

while(numbers.length < need){

if(!exclude.includes(n)){
numbers.push(n)
}

n++

}

numbers.sort(()=>Math.random()-0.5)

circles.forEach((c,i)=>{
c.innerText=numbers[i]
})

}

function resetAll(){

circles.forEach(c=>c.remove())

circles=[]
createNumber=1

}

</script>

</body>
</html>
```
