```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>자리 생성기</title>

<style>

body{
background:white;
font-family:sans-serif;
text-align:center;
display:flex;
justify-content:center;
}

.container{
display:flex;
}

#grid{
display:grid;
grid-template-columns: repeat(6,70px);
gap:10px;
margin-top:40px;
}

.seat{
width:70px;
height:70px;
border:1px solid black;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
position:relative;
}

.circle{
position:absolute;
width:40px;
height:40px;
border:3px solid red;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:red;
}

.side{
margin-left:40px;
margin-top:80px;
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<div>

<h2>자리 생성기</h2>

<button onclick="generate()">자리 생성</button>
<button onclick="shuffle()">랜덤 섞기</button>

<div id="grid"></div>

</div>

<div class="side">
<h3>제외 번호</h3>
<div id="exclude"></div>
</div>

</div>

<script>

let seats = 30
let clickOrder = []
let excluded = new Set()

function generate(){

let grid=document.getElementById("grid")
grid.innerHTML=""

for(let i=1;i<=seats;i++){

let div=document.createElement("div")
div.className="seat"
div.dataset.num=i
div.innerText=i

div.onclick=()=>clickSeat(div)

grid.appendChild(div)

}

createExclude()

}

function clickSeat(div){

let num=parseInt(div.dataset.num)

if(excluded.has(num)) return

if(clickOrder.includes(num)){
clickOrder=clickOrder.filter(n=>n!==num)
}else{
clickOrder.push(num)
}

updateCircles()

}

function updateCircles(){

document.querySelectorAll(".circle").forEach(e=>e.remove())

clickOrder.forEach((num,i)=>{

let seat=document.querySelector(`[data-num='${num}']`)

let circle=document.createElement("div")
circle.className="circle"
circle.innerText=i+1

seat.appendChild(circle)

})

}

function shuffle(){

let numbers=[]

for(let i=1;i<=seats;i++){
if(!excluded.has(i)) numbers.push(i)
}

numbers.sort(()=>Math.random()-0.5)

document.querySelectorAll(".seat").forEach((seat,i)=>{

let n=parseInt(seat.dataset.num)

if(excluded.has(n)){
seat.style.background="#ddd"
}else{
seat.style.background="white"
}

})

}

function createExclude(){

let box=document.getElementById("exclude")
box.innerHTML=""

for(let i=1;i<=seats;i++){

let label=document.createElement("label")

let cb=document.createElement("input")
cb.type="checkbox"
cb.value=i

cb.onchange=()=>{

if(cb.checked){
excluded.add(i)
}else{
excluded.delete(i)
}

}

label.append(cb," "+i)

box.appendChild(label)
box.appendChild(document.createElement("br"))

}

}

generate()

</script>

</body>
</html>
```
