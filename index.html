```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seat Picker</title>

<style>

body{
margin:0;
background:white;
font-family:sans-serif;
}

#controls{
position:fixed;
top:20px;
right:20px;
background:white;
padding:15px;
border:1px solid #ccc;
}

button{
display:block;
margin-top:6px;
width:120px;
}

.circle{
position:absolute;
width:70px;
height:70px;
border:3px solid black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
transform:translate(-50%,-50%);
}

</style>

</head>

<body>

<div id="controls">

<div>제외 번호</div>
<input id="exclude" placeholder="예: 2,5,7">

<button onclick="undo()">Undo</button>
<button onclick="shuffle()">Random</button>
<button onclick="resetAll()">Reset</button>

</div>

<script>

let circles=[]
let createNumber=1

document.addEventListener("click",function(e){

if(e.target.tagName==="INPUT" || e.target.tagName==="BUTTON") return

let circle=document.createElement("div")

circle.className="circle"
circle.innerText=createNumber

circle.style.left=e.pageX+"px"
circle.style.top=e.pageY+"px"

document.body.appendChild(circle)

circles.push(circle)

createNumber++

})

function undo(){

let last=circles.pop()

if(last){
last.remove()
createNumber--
}

}

function getExclude(){

let text=document.getElementById("exclude").value

if(text.trim()=="") return []

return text.split(",").map(n=>parseInt(n.trim()))

}

function shuffle(){

let exclude=getExclude()

let needed=circles.length

let numbers=[]
let n=1

while(numbers.length < needed){

if(!exclude.includes(n)){
numbers.push(n)
}

n++

}

numbers.sort(()=>Math.random()-0.5)

circles.forEach((c,i)=>{
c.innerText=numbers[i]
})

}

function resetAll(){

circles.forEach(c=>c.remove())

circles=[]
createNumber=1

}

</script>

</body>
</html>
