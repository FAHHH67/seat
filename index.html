```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seat Picker</title>

<style>

body{
margin:0;
background:#e9e9e9;
font-family:sans-serif;
display:flex;
height:100vh;
align-items:center;
justify-content:center;
}

#layout{
display:flex;
gap:30px;
align-items:center;
}

#seatArea{
width:650px;
height:450px;
background:white;
border:3px solid black;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
position:relative;
overflow:hidden;
}

#panel{
width:180px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

#panel button{
width:100%;
margin-top:8px;
padding:6px;
}

#panel input{
width:100%;
margin-top:6px;
margin-bottom:6px;
padding:5px;
}

.circle{
position:absolute;
width:70px;
height:70px;
border:3px solid black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
background:white;
transform:translate(-50%,-50%);
cursor:pointer;
}

</style>
</head>

<body>

<div id="layout">

<div id="seatArea"></div>

<div id="panel">

<div>제외 번호</div>
<input id="exclude" placeholder="2,5,7">

<button onclick="undo()">Undo</button>
<button onclick="shuffleNumbers()">Random</button>
<button onclick="resetAll()">Reset</button>

</div>

</div>

<script>

let area=document.getElementById("seatArea")
let circles=[]
let createNumber=1

area.addEventListener("click",function(e){

if(e.target.classList.contains("circle")) return

let rect=area.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

let circle=document.createElement("div")

circle.className="circle"
circle.innerText=createNumber

circle.style.left=x+"px"
circle.style.top=y+"px"

circle.addEventListener("click",function(event){
event.stopPropagation()
})

area.appendChild(circle)

circles.push(circle)

createNumber++

})

function undo(){

let last=circles.pop()

if(last){
last.remove()
createNumber--
}

}

function getExclude(){

let text=document.getElementById("exclude").value

if(text.trim()==="") return []

return text.split(",").map(n=>parseInt(n.trim())).filter(n=>!isNaN(n))

}

function shuffleNumbers(){

let exclude=getExclude()

let seatCount=circles.length

/* 번호 생성 (1~자리수) */
let numbers=[]
for(let i=1;i<=seatCount;i++){
numbers.push(i)
}

/* 제외번호 제거 */
numbers=numbers.filter(n=>!exclude.includes(n))

/* 랜덤 섞기 */
numbers.sort(()=>Math.random()-0.5)

/* 자리 배치 */
circles.forEach((c,i)=>{

if(numbers[i]!==undefined){
c.innerText=numbers[i]
}else{
c.innerText=""
}

})

}

function resetAll(){

circles.forEach(c=>c.remove())

circles=[]
createNumber=1

}

</script>

</body>
</html>
```
