```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seat Picker</title>

<style>

body{
margin:0;
background:white;
font-family:sans-serif;
}

#controls{
position:fixed;
top:20px;
right:20px;
}

input{
padding:6px;
font-size:14px;
}

.circle{
position:absolute;
width:70px;
height:70px;
border:3px solid black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
transform:translate(-50%,-50%);
}

</style>

</head>

<body>

<div id="controls">
제외 번호<br>
<input id="exclude" placeholder="예: 2,5,7">
</div>

<script>

let current=1

document.addEventListener("click",function(e){

if(e.target.tagName==="INPUT") return

let excludeInput=document.getElementById("exclude").value
let exclude=[]

if(excludeInput.trim()!=""){
exclude=excludeInput.split(",").map(n=>parseInt(n.trim()))
}

while(exclude.includes(current)){
current++
}

let circle=document.createElement("div")
circle.className="circle"
circle.innerText=current

circle.style.left=e.pageX+"px"
circle.style.top=e.pageY+"px"

document.body.appendChild(circle)

current++

})

</script>

</body>
</html>
```
