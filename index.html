```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seat Picker</title>

<style>

body{
margin:0;
background:white;
font-family:sans-serif;
}

#panel{
position:fixed;
top:20px;
right:20px;
width:140px;
background:#f7f7f7;
border:2px solid black;
padding:10px;
box-shadow:2px 2px 6px rgba(0,0,0,0.2);
}

#panel button{
display:block;
margin-top:6px;
width:100%;
}

#panel input{
width:100%;
}

.circle{
position:absolute;
width:70px;
height:70px;
border:3px solid black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
transform:translate(-50%,-50%);
background:white;
}

</style>

</head>

<body>

<div id="panel">

<div>제외 번호</div>
<input id="exclude" placeholder="2,5,7">

<button onclick="undo()">Undo</button>
<button onclick="shuffleNumbers()">Random</button>
<button onclick="resetAll()">Reset</button>

</div>

<script>

let circles=[]
let createNumber=1

document.addEventListener("click",function(e){

// 패널 안 클릭하면 자리 생성 안됨
if(e.target.closest("#panel")) return

let circle=document.createElement("div")

circle.className="circle"
circle.innerText=createNumber

circle.style.left=e.pageX+"px"
circle.style.top=e.pageY+"px"

document.body.appendChild(circle)

circles.push(circle)

createNumber++

})

function undo(){

let last=circles.pop()

if(last){
last.remove()
createNumber--
}

}

function getExclude(){

let text=document.getElementById("exclude").value

if(text.trim()==="") return []

return text.split(",").map(n=>parseInt(n.trim())).filter(n=>!isNaN(n))

}

function shuffleNumbers(){

let exclude=getExclude()

let need=circles.length
let numbers=[]
let n=1

while(numbers.length < need){

if(!exclude.includes(n)){
numbers.push(n)
}

n++

}

numbers.sort(()=>Math.random()-0.5)

circles.forEach((c,i)=>{
c.innerText=numbers[i]
})

}

function resetAll(){

circles.forEach(c=>c.remove())

circles=[]
createNumber=1

}

</script>

</body>
</html>
```
